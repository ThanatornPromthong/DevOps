<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-Egde">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://unpkg.com/boxicons@2.14/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <form id="login-form">
            <h1>เข้าสู่ระบบ</h1>
            <div class="input-box">
                <input type="text" id="login-username" placeholder="ชื่อผู้ใช้" required>
            </div>

            <div class="input-box">
                <input type="password" id="login-password" placeholder="รหัสผ่าน" required>
            </div>

            <button type="submit" class="btn">เข้าสู่ระบบ</button>

            <div class="register-link">
                <p>ไม่มีบัญชีใช่หรือไม่ <a href="register.html">สมัครบัญชี</a></p>
            </div>
        </form>
    </div>

    <script>
        // ตรวจสอบข้อมูลล็อกอิน
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault(); // ป้องกันการรีเฟรชหน้าเว็บ

            // ดึงค่าจากช่องกรอกข้อมูล
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value.trim();

            // ตรวจสอบข้อมูลสำหรับผู้ดูแลระบบ
            if (username === "admin" && password === "2549") {
                window.location.href = "admin_menu.html"; // เปลี่ยนเส้นทางไปยังหน้า admin_menu.html
                return;
            }

            // ตรวจสอบข้อมูลผู้ใช้ทั่วไปจาก Local Storage
            const storedUser = JSON.parse(localStorage.getItem("user"));
            if (storedUser && username === storedUser.username && password === storedUser.password) {
                alert("เข้าสู่ระบบสำเร็จ!");
                window.location.href = "index.html"; // เปลี่ยนเส้นทางไปยังหน้า index.html
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            }
        });
    </script>
</body>
</html>
